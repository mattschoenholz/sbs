<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBS Chart Test — MapLibre + Local ENCs</title>
<link href="vendor/maplibre/maplibre-gl.css" rel="stylesheet">
<script src="vendor/maplibre/maplibre-gl.js"></script>
<script src="vendor/pmtiles/pmtiles.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #0d1117; font-family: 'Barlow Condensed', sans-serif; }
  #map { width: 100%; height: 100%; }

  #legend {
    position: absolute;
    top: 12px; left: 12px;
    background: rgba(13,17,23,0.92);
    border: 1px solid #2a3a4a;
    border-radius: 6px;
    padding: 10px 14px;
    color: #c9d1d9;
    font-size: 12px;
    min-width: 140px;
    z-index: 10;
  }
  #legend h3 {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #8b949e;
    margin-bottom: 8px;
  }
  .legend-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
    font-size: 12px;
  }
  .legend-swatch {
    width: 18px; height: 12px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  #info {
    position: absolute;
    bottom: 28px; left: 12px;
    background: rgba(13,17,23,0.85);
    border: 1px solid #2a3a4a;
    border-radius: 6px;
    padding: 8px 12px;
    color: #8b949e;
    font-size: 11px;
    letter-spacing: 0.05em;
    z-index: 10;
  }
  #info span { color: #79c0ff; }

  #status {
    position: absolute;
    bottom: 56px; left: 12px;
    background: rgba(13,17,23,0.85);
    border: 1px solid #2a3a4a;
    border-radius: 6px;
    padding: 6px 10px;
    color: #8b949e;
    font-size: 10px;
    z-index: 10;
    display: none;
  }

  .maplibregl-ctrl-attrib { font-size: 10px; }
</style>
</head>
<body>
<div id="map"></div>

<div id="legend">
  <h3>Depth (feet)</h3>
  <div class="legend-row"><div class="legend-swatch" style="background:#aed6f1"></div> 0 – 10 ft</div>
  <div class="legend-row"><div class="legend-swatch" style="background:#5dade2"></div> 10 – 33 ft</div>
  <div class="legend-row"><div class="legend-swatch" style="background:#2980b9"></div> 33 – 98 ft</div>
  <div class="legend-row"><div class="legend-swatch" style="background:#1b5e8a"></div> 98 + ft</div>
  <div class="legend-row" style="margin-top:6px">
    <div style="width:18px;text-align:center;color:#4a6a8a;font-size:10px;background:rgba(255,255,255,0.75);border-radius:2px">30</div>
    Soundings (ft) z≥10
  </div>
</div>

<div id="status"></div>

<div id="info">
  Zoom <span id="zoom-val">—</span> &nbsp;|&nbsp;
  Source: NOAA ENC (local) + ESRI Ocean base &nbsp;|&nbsp;
  <a href="/index.html" style="color:#79c0ff">← Back to portal</a>
</div>

<script>
const ENC_FILE_URL = `${window.location.origin}/charts/enc.pmtiles`;
const encTiles     = new pmtiles.PMTiles(ENC_FILE_URL);
const protocol     = new pmtiles.Protocol();
protocol.add(encTiles);
maplibregl.addProtocol('pmtiles', protocol.tile.bind(protocol));

const ENC_URL    = `pmtiles://${ENC_FILE_URL}`;
const ESRI_OCEAN = 'https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}';
// ESRI Ocean Reference: transparent label overlay (water body names, ports, etc.)
const ESRI_LABELS = 'https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Reference/MapServer/tile/{z}/{y}/{x}';

function setStatus(msg) {
  const el = document.getElementById('status');
  if (msg) { el.style.display = 'block'; el.textContent = msg; }
  else { el.style.display = 'none'; }
}

// Generate canvas-drawn depth sounding icon.
// depthStr is in metres (from ENC data) — converted to feet for display.
// Styled to be readable but unobtrusive — smaller, lighter than chart labels.
function makeDepthImage(depthStr, dpr) {
  const metres = parseFloat(depthStr);
  const feet = Math.round(metres * 3.28084);
  const label = isNaN(feet) ? depthStr : String(feet);

  const W = 28, H = 16;
  const scale = dpr || 1;
  const canvas = document.createElement('canvas');
  canvas.width = W * scale; canvas.height = H * scale;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);
  ctx.font = `10px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // Subtle halo so numbers read over both light and dark tiles
  ctx.strokeStyle = 'rgba(255,255,255,0.75)';
  ctx.lineWidth = 2;
  ctx.strokeText(label, W / 2, H / 2);
  // Muted navy — readable without demanding attention
  ctx.fillStyle = '#4a6a8a';
  ctx.fillText(label, W / 2, H / 2);
  return {
    width: W * scale,
    height: H * scale,
    data: new Uint8Array(ctx.getImageData(0, 0, W * scale, H * scale).data.buffer)
  };
}

const map = new maplibregl.Map({
  container: 'map',
  // Keep lots of tiles in memory — prevents unloading when panning back to a visited area
  maxTileCacheSize: 800,
  // No fade animation — tiles appear instantly rather than fading in over ~300ms
  fadeDuration: 0,
  // Route ESRI tiles through Pi nginx proxy cache (/tiles-esri/) so they're
  // served from Pi LAN after first load instead of refetching from internet
  transformRequest: (url, resourceType) => {
    if (resourceType === 'Tile' && url.includes('arcgisonline.com')) {
      // Rewrite to local proxy: /tiles-esri/Ocean/World_Ocean_Base/.../z/y/x
      const m = url.match(/services\/(Ocean\/\w+)\/MapServer\/tile\/(\d+)\/(\d+)\/(\d+)/);
      if (m) return { url: `/tiles-esri/${m[1]}/${m[2]}/${m[3]}/${m[4]}` };
    }
  },
  style: {
    version: 8,
    // No glyphs — depth numbers are canvas-drawn icons, generated on demand via styleimagemissing
    sources: {
      esri: {
        type: 'raster',
        tiles: [ESRI_OCEAN],
        tileSize: 256,
        maxzoom: 17,
        attribution: 'Esri, NOAA'
      },
      enc: {
        type: 'vector',
        url: ENC_URL
      },
      labels: {
        type: 'raster',
        tiles: [ESRI_LABELS],
        tileSize: 256,
        maxzoom: 13,
        attribution: 'Esri'
      }
    },
    layers: [
      { id: 'esri-base', type: 'raster', source: 'esri', paint: { 'raster-opacity': 1 } },

      // Depth areas (DEPARE) — deepest first
      { id: 'depare-deep',     type: 'fill', source: 'enc', 'source-layer': 'DEPARE',
        filter: ['>=', ['to-number', ['get', 'DRVAL1']], 30],
        paint: { 'fill-color': '#1b5e8a', 'fill-opacity': 0.72 } },
      { id: 'depare-medium',   type: 'fill', source: 'enc', 'source-layer': 'DEPARE',
        filter: ['all', ['>=', ['to-number', ['get', 'DRVAL1']], 10], ['<', ['to-number', ['get', 'DRVAL1']], 30]],
        paint: { 'fill-color': '#2980b9', 'fill-opacity': 0.72 } },
      { id: 'depare-shallow',  type: 'fill', source: 'enc', 'source-layer': 'DEPARE',
        filter: ['all', ['>=', ['to-number', ['get', 'DRVAL1']], 3], ['<', ['to-number', ['get', 'DRVAL1']], 10]],
        paint: { 'fill-color': '#5dade2', 'fill-opacity': 0.75 } },
      { id: 'depare-vshallow', type: 'fill', source: 'enc', 'source-layer': 'DEPARE',
        filter: ['all', ['>=', ['to-number', ['get', 'DRVAL1']], 0], ['<', ['to-number', ['get', 'DRVAL1']], 3]],
        paint: { 'fill-color': '#aed6f1', 'fill-opacity': 0.82 } },
      { id: 'depare-drying',   type: 'fill', source: 'enc', 'source-layer': 'DEPARE',
        filter: ['<', ['to-number', ['get', 'DRVAL1']], 0],
        paint: { 'fill-color': '#d4e6b5', 'fill-opacity': 0.85 } },

      // Land areas — transparent so ESRI basemap shows through
      { id: 'lndare', type: 'fill', source: 'enc', 'source-layer': 'LNDARE',
        paint: { 'fill-color': '#c8a97e', 'fill-opacity': 0 } },

      // Depth contours
      { id: 'depcnt', type: 'line', source: 'enc', 'source-layer': 'DEPCNT',
        paint: { 'line-color': '#1a5276',
                 'line-width': ['interpolate', ['linear'], ['zoom'], 10, 0.6, 16, 1.4],
                 'line-opacity': 0.7 } },

      // Coastline
      { id: 'coalne', type: 'line', source: 'enc', 'source-layer': 'COALNE',
        paint: { 'line-color': '#5d4037', 'line-width': 1.2 } },

      // Traffic separation schemes / shipping lanes
      { id: 'tsslpt', type: 'fill', source: 'enc', 'source-layer': 'TSSLPT',
        paint: { 'fill-color': '#7f8c8d', 'fill-opacity': 0.15 } },
      { id: 'tssron', type: 'fill', source: 'enc', 'source-layer': 'TSSRON',
        paint: { 'fill-color': '#95a5a6', 'fill-opacity': 0.12 } },
      { id: 'fairwy', type: 'fill', source: 'enc', 'source-layer': 'FAIRWY',
        minzoom: 9,
        paint: { 'fill-color': '#5d8aa8', 'fill-opacity': 0.12 } },
      { id: 'trafic-line', type: 'line', source: 'enc', 'source-layer': 'TRAFIC',
        minzoom: 8,
        paint: { 'line-color': '#7f8c8d', 'line-width': 1, 'line-dasharray': [4, 3], 'line-opacity': 0.7 } },

      // Restricted / special areas
      { id: 'resare', type: 'fill', source: 'enc', 'source-layer': 'RESARE',
        minzoom: 9,
        paint: { 'fill-color': '#e74c3c', 'fill-opacity': 0.06,
                 'fill-outline-color': '#e74c3c' } },
      { id: 'airare', type: 'fill', source: 'enc', 'source-layer': 'AIRARE',
        minzoom: 9,
        paint: { 'fill-color': '#f39c12', 'fill-opacity': 0.15,
                 'fill-outline-color': '#f39c12' } },
      { id: 'achare', type: 'fill', source: 'enc', 'source-layer': 'ACHARE',
        minzoom: 10,
        paint: { 'fill-color': '#8e44ad', 'fill-opacity': 0.1,
                 'fill-outline-color': '#8e44ad' } },
      { id: 'drgare', type: 'fill', source: 'enc', 'source-layer': 'DRGARE',
        minzoom: 10,
        paint: { 'fill-color': '#16a085', 'fill-opacity': 0.18,
                 'fill-outline-color': '#16a085' } },

      // Hazards
      { id: 'wrecks', type: 'circle', source: 'enc', 'source-layer': 'WRECKS',
        minzoom: 11,
        paint: { 'circle-color': '#e74c3c', 'circle-radius': 4, 'circle-opacity': 0.9,
                 'circle-stroke-color': '#fff', 'circle-stroke-width': 1 } },
      { id: 'obstrn', type: 'circle', source: 'enc', 'source-layer': 'OBSTRN',
        minzoom: 12,
        paint: { 'circle-color': '#e67e22', 'circle-radius': 3, 'circle-opacity': 0.8,
                 'circle-stroke-color': '#fff', 'circle-stroke-width': 1 } },
      { id: 'uwtroc', type: 'circle', source: 'enc', 'source-layer': 'UWTROC',
        minzoom: 12,
        paint: { 'circle-color': '#c0392b', 'circle-radius': 3, 'circle-opacity': 0.75,
                 'circle-stroke-color': '#fff', 'circle-stroke-width': 1 } },

      // Buoys & beacons — color-coded by type
      // BOYLAT: lateral marks — filter on CATLAM (scalar int) not COLOUR (array, unreliable in MVT)
      // IALA-B: CATLAM=2 → port → red; CATLAM=1 → starboard → green
      { id: 'boylat-port', type: 'circle', source: 'enc', 'source-layer': 'BOYLAT',
        minzoom: 12,
        filter: ['==', ['to-number', ['get', 'CATLAM']], 2],
        paint: { 'circle-color': '#e74c3c', 'circle-radius': 5, 'circle-opacity': 1,
                 'circle-stroke-color': '#fff', 'circle-stroke-width': 1.5 } },
      { id: 'boylat-stbd', type: 'circle', source: 'enc', 'source-layer': 'BOYLAT',
        minzoom: 12,
        filter: ['==', ['to-number', ['get', 'CATLAM']], 1],
        paint: { 'circle-color': '#27ae60', 'circle-radius': 5, 'circle-opacity': 1,
                 'circle-stroke-color': '#fff', 'circle-stroke-width': 1.5 } },
      { id: 'boylat-other', type: 'circle', source: 'enc', 'source-layer': 'BOYLAT',
        minzoom: 12,
        filter: ['!', ['in', ['to-number', ['get', 'CATLAM']], ['literal', [1, 2]]]],
        paint: { 'circle-color': '#f1c40f', 'circle-radius': 4, 'circle-opacity': 1,
                 'circle-stroke-color': '#333', 'circle-stroke-width': 1 } },
      // Cardinal/safe water buoys
      { id: 'boycar', type: 'circle', source: 'enc', 'source-layer': 'BOYCAR',
        minzoom: 12,
        paint: { 'circle-color': '#f1c40f', 'circle-radius': 5, 'circle-opacity': 1,
                 'circle-stroke-color': '#1a1a1a', 'circle-stroke-width': 1.5 } },
      { id: 'boysaw', type: 'circle', source: 'enc', 'source-layer': 'BOYSAW',
        minzoom: 12,
        paint: { 'circle-color': '#e74c3c', 'circle-radius': 5, 'circle-opacity': 1,
                 'circle-stroke-color': '#fff', 'circle-stroke-width': 1.5 } },
      // Beacons
      { id: 'bcnlat', type: 'circle', source: 'enc', 'source-layer': 'BCNLAT',
        minzoom: 12,
        paint: { 'circle-color': '#27ae60', 'circle-radius': 4, 'circle-opacity': 1,
                 'circle-stroke-color': '#fff', 'circle-stroke-width': 1 } },
      { id: 'bcncar', type: 'circle', source: 'enc', 'source-layer': 'BCNCAR',
        minzoom: 12,
        paint: { 'circle-color': '#f1c40f', 'circle-radius': 4, 'circle-opacity': 1,
                 'circle-stroke-color': '#333', 'circle-stroke-width': 1 } },
      // Special purpose buoys (e.g., Lake Union channel markers, mooring buoys)
      { id: 'boyspp', type: 'circle', source: 'enc', 'source-layer': 'BOYSPP',
        minzoom: 12,
        paint: { 'circle-color': '#f39c12', 'circle-radius': 4, 'circle-opacity': 0.9,
                 'circle-stroke-color': '#fff', 'circle-stroke-width': 1 } },
      // Lights — rendered as small amber dot at zoom 11+, bigger at 13+
      { id: 'lights', type: 'circle', source: 'enc', 'source-layer': 'LIGHTS',
        minzoom: 11,
        paint: {
          'circle-color': '#ffd700',
          'circle-radius': ['interpolate', ['linear'], ['zoom'], 11, 2, 14, 4],
          'circle-opacity': 0.9,
          'circle-stroke-color': '#000', 'circle-stroke-width': 0.5
        } },

      // Water body / place name labels — ESRI Ocean Reference transparent overlay
      // Full opacity at low zoom, fades out as soundings take over at zoom 10+
      { id: 'esri-labels', type: 'raster', source: 'labels',
        paint: {
          'raster-opacity': ['interpolate', ['linear'], ['zoom'],
            7,  1.0,
            10, 0.8,
            12, 0.3,
            13, 0.0
          ]
        }
      },

      // Depth soundings — from PMTiles SOUNDG layer (tiled, on-demand)
      // Icon images generated lazily via styleimagemissing — no upfront GeoJSON load
      { id: 'soundings', type: 'symbol', source: 'enc', 'source-layer': 'SOUNDG',
        minzoom: 10,
        layout: {
          'icon-image': ['concat', 'snd-', ['get', 'DEPTH']],
          'icon-allow-overlap': false,
          'icon-ignore-placement': false,
          'symbol-sort-key': ['to-number', ['get', 'DEPTH']]
        }
      }
    ]
  },
  center: [-122.34, 47.62],
  zoom: 11,
  maxZoom: 16,
  minZoom: 7
});

map.addControl(new maplibregl.NavigationControl(), 'top-right');
map.addControl(new maplibregl.ScaleControl({ unit: 'nautical' }), 'bottom-right');

map.on('error', e => console.warn('Map error:', e.sourceId, e.error?.message));

// ── Startup: fetch GPS position from SignalK, center map, pre-warm tile cache ──

const SK_POSITION_URL = '/signalk/v1/api/vessels/self/navigation/position';
const PREWARM_ZOOMS_NEAR = [8, 9, 10, 11, 12, 13]; // 20nm radius
const PREWARM_ZOOMS_FAR  = [8, 9, 10, 11];          // 20-30nm ring
const NM_TO_DEG = 1 / 60;  // 1 nautical mile ≈ 1/60 degree latitude

function lngLatToTile(lng, lat, z) {
  const n = Math.pow(2, z);
  const x = Math.floor((lng + 180) / 360 * n);
  const latRad = lat * Math.PI / 180;
  const y = Math.floor((1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n);
  return { x, y, z };
}

function tilesInBbox(sw, ne, z) {
  const tMin = lngLatToTile(sw[0], ne[1], z); // NW corner
  const tMax = lngLatToTile(ne[0], sw[1], z); // SE corner
  const tiles = [];
  for (let x = tMin.x; x <= tMax.x; x++)
    for (let y = tMin.y; y <= tMax.y; y++)
      tiles.push({ x, y, z });
  return tiles;
}

async function prewarmEsriTiles(lat, lng, radiusNm, zooms, statusEl) {
  const dLat = radiusNm * NM_TO_DEG;
  const dLng = dLat / Math.cos(lat * Math.PI / 180);
  const sw = [lng - dLng, lat - dLat];
  const ne = [lng + dLng, lat + dLat];

  const layers = ['Ocean/World_Ocean_Base', 'Ocean/World_Ocean_Reference'];
  let total = 0, done = 0;

  // Count tiles first
  for (const z of zooms) total += tilesInBbox(sw, ne, z).length * layers.length;

  for (const layer of layers) {
    for (const z of zooms) {
      for (const { x, y } of tilesInBbox(sw, ne, z)) {
        fetch(`/tiles-esri/${layer}/${z}/${y}/${x}`, { priority: 'low' })
          .catch(() => {})
          .finally(() => {
            done++;
            if (statusEl && done % 10 === 0)
              statusEl.textContent = `Pre-warming tiles… ${done}/${total}`;
            if (done === total && statusEl) {
              statusEl.textContent = `Tile cache warm — ${total} ESRI tiles fetched`;
              setTimeout(() => { statusEl.style.display = 'none'; }, 3000);
            }
          });
        // Pace requests: 8 concurrent max — yield every 8
        if (done % 8 === 0) await new Promise(r => setTimeout(r, 50));
      }
    }
  }
}

async function initPosition() {
  const statusEl = document.getElementById('status');
  statusEl.style.display = 'block';
  statusEl.textContent = 'Fetching GPS position from SignalK…';

  let lat, lng;
  try {
    const res = await fetch(SK_POSITION_URL, { signal: AbortSignal.timeout(4000) });
    if (res.ok) {
      const data = await res.json();
      lat = data.value?.latitude;
      lng = data.value?.longitude;
    }
  } catch (e) { /* SignalK not reachable — stay on default center */ }

  if (lat && lng) {
    statusEl.textContent = `Position: ${lat.toFixed(4)}°, ${lng.toFixed(4)}° — centering map…`;
    map.flyTo({ center: [lng, lat], zoom: map.getZoom(), duration: 1000 });

    // Add boat marker
    new maplibregl.Marker({ color: '#e8940a', scale: 0.9 })
      .setLngLat([lng, lat])
      .setPopup(new maplibregl.Popup().setHTML('<strong>Vessel position</strong>'))
      .addTo(map);

    // Pre-warm: 20nm radius first, then 30nm ring
    statusEl.textContent = 'Pre-warming 20nm tile cache…';
    await prewarmEsriTiles(lat, lng, 20, PREWARM_ZOOMS_NEAR, statusEl);
    // 30nm ring (outer only — inner already done)
    await prewarmEsriTiles(lat, lng, 30, PREWARM_ZOOMS_FAR, statusEl);
  } else {
    statusEl.textContent = 'SignalK unavailable — using default chart center';
    setTimeout(() => { statusEl.style.display = 'none'; }, 3000);
    // Still pre-warm around default center
    const [defLng, defLat] = map.getCenter().toArray();
    await prewarmEsriTiles(defLat, defLng, 20, PREWARM_ZOOMS_NEAR, statusEl);
  }
}

map.on('load', () => { initPosition(); });

// Generate depth icons lazily — only when MapLibre asks for one it hasn't seen yet.
// This replaces the up-front GeoJSON load and avoids blocking the initial render.
const dpr = window.devicePixelRatio || 1;
map.on('styleimagemissing', e => {
  const id = e.id;
  if (!id.startsWith('snd-')) return;
  const depth = id.slice(4);
  map.addImage(id, makeDepthImage(depth, dpr), { pixelRatio: dpr });
});

// Zoom display
const zoomEl = document.getElementById('zoom-val');
function updateZoom() { zoomEl.textContent = map.getZoom().toFixed(1); }
map.on('zoom', updateZoom);
map.on('load', updateZoom);

// Click soundings for popup
map.on('click', 'soundings', e => {
  const metres = parseFloat(e.features[0].properties.DEPTH);
  const feet = Math.round(metres * 3.28084);
  new maplibregl.Popup()
    .setLngLat(e.lngLat)
    .setHTML(`<strong>Sounding</strong><br>${feet} ft (${metres} m)`)
    .addTo(map);
});
map.on('mouseenter', 'soundings', () => map.getCanvas().style.cursor = 'pointer');
map.on('mouseleave', 'soundings', () => map.getCanvas().style.cursor = '');
</script>
</body>
</html>
