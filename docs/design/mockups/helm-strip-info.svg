<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 768" width="1024" height="768">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700&amp;family=Share+Tech+Mono&amp;family=Barlow:wght@300;400;500&amp;display=swap');
    </style>
  </defs>

  <!-- Background (c-void) -->
  <rect width="1024" height="768" fill="#080c10"/>

  <!-- ── TOP BAR ── -->
  <rect x="0" y="0" width="1024" height="40" fill="#0d1318"/>
  <line x1="0" y1="40" x2="1024" y2="40" stroke="#1e2e3a" stroke-width="1"/>
  <text x="12" y="26" font-family="Barlow Condensed, sans-serif" font-size="13" font-weight="700" letter-spacing="0.12em" fill="#e8940a">HELM</text>
  <!-- Clock -->
  <text x="940" y="26" font-family="Share Tech Mono, monospace" font-size="11" fill="#8fa3b3">14:32 UTC</text>
  <!-- Connection dot -->
  <circle cx="920" cy="22" r="4" fill="#22c55e"/>

  <!-- ── TAB BAR ── -->
  <rect x="0" y="40" width="1024" height="36" fill="#0d1318"/>
  <line x1="0" y1="76" x2="1024" y2="76" stroke="#1e2e3a" stroke-width="1"/>
  <!-- Tab: Instruments (active) -->
  <text x="128" y="62" font-family="Barlow Condensed, sans-serif" font-size="12" font-weight="700" letter-spacing="0.08em" fill="#f5a820" text-anchor="middle">INSTRUMENTS</text>
  <rect x="64" y="73" width="128" height="2" rx="1" fill="#e8940a"/>
  <!-- Tab: Chart -->
  <text x="384" y="62" font-family="Barlow Condensed, sans-serif" font-size="12" font-weight="700" letter-spacing="0.08em" fill="#4a6070" text-anchor="middle">CHART</text>
  <!-- Tab: Passage -->
  <text x="640" y="62" font-family="Barlow Condensed, sans-serif" font-size="12" font-weight="700" letter-spacing="0.08em" fill="#4a6070" text-anchor="middle">PASSAGE</text>
  <!-- Tab: Weather -->
  <text x="896" y="62" font-family="Barlow Condensed, sans-serif" font-size="12" font-weight="700" letter-spacing="0.08em" fill="#4a6070" text-anchor="middle">WEATHER</text>

  <!-- ── INSTRUMENT GRID ── -->
  <!-- Available area: y=76 to y=732 (768-36 strip) = 656px height, 1024 wide -->
  <!-- Grid: 3 cols x 3 rows, 3px gap, 3px padding -->
  <!-- Col width: (1024 - 6 - 6) / 3 = ~337px each -->
  <!-- Row heights: row1 & row2 share top 2/3, row3 (AP) bottom 1/3 -->
  <!-- Row 1: y=79, h=205 | Row 2: y=287, h=205 | Row 3 (AP): y=495, h=145 (0.7 ratio) -->

  <!-- ROW 1 -->
  <!-- SOG tile (amber) -->
  <g id="tile-sog">
    <rect x="3" y="79" width="337" height="205" rx="8" fill="#111920" stroke="#1e2e3a" stroke-width="1"/>
    <text x="171" y="98" font-family="Barlow Condensed, sans-serif" font-size="11" font-weight="700" letter-spacing="0.12em" fill="#4a6070" text-anchor="middle">SOG</text>
    <text x="171" y="195" font-family="Share Tech Mono, monospace" font-size="60" fill="#f5a820" text-anchor="middle" dominant-baseline="central">4.2</text>
    <text x="171" y="265" font-family="Barlow Condensed, sans-serif" font-size="13" letter-spacing="0.1em" fill="#8fa3b3" text-anchor="middle">KN</text>
  </g>

  <!-- COG tile -->
  <g id="tile-cog">
    <rect x="343" y="79" width="338" height="205" rx="8" fill="#111920" stroke="#1e2e3a" stroke-width="1"/>
    <text x="512" y="98" font-family="Barlow Condensed, sans-serif" font-size="11" font-weight="700" letter-spacing="0.12em" fill="#4a6070" text-anchor="middle">COG</text>
    <text x="512" y="195" font-family="Share Tech Mono, monospace" font-size="60" fill="#f0f4f8" text-anchor="middle" dominant-baseline="central">245</text>
    <text x="512" y="265" font-family="Barlow Condensed, sans-serif" font-size="13" letter-spacing="0.1em" fill="#8fa3b3" text-anchor="middle">DEG T</text>
  </g>

  <!-- DEPTH tile -->
  <g id="tile-depth">
    <rect x="684" y="79" width="337" height="205" rx="8" fill="#111920" stroke="#1e2e3a" stroke-width="1"/>
    <text x="852" y="98" font-family="Barlow Condensed, sans-serif" font-size="11" font-weight="700" letter-spacing="0.12em" fill="#4a6070" text-anchor="middle">DEPTH</text>
    <text x="852" y="195" font-family="Share Tech Mono, monospace" font-size="60" fill="#f0f4f8" text-anchor="middle" dominant-baseline="central">18.2</text>
    <text x="852" y="265" font-family="Barlow Condensed, sans-serif" font-size="13" letter-spacing="0.1em" fill="#8fa3b3" text-anchor="middle">FT</text>
  </g>

  <!-- ROW 2 -->
  <!-- TWS tile -->
  <g id="tile-tws">
    <rect x="3" y="287" width="337" height="205" rx="8" fill="#111920" stroke="#1e2e3a" stroke-width="1"/>
    <text x="171" y="306" font-family="Barlow Condensed, sans-serif" font-size="11" font-weight="700" letter-spacing="0.12em" fill="#4a6070" text-anchor="middle">TWS</text>
    <text x="171" y="403" font-family="Share Tech Mono, monospace" font-size="60" fill="#f0f4f8" text-anchor="middle" dominant-baseline="central">12.4</text>
    <text x="171" y="473" font-family="Barlow Condensed, sans-serif" font-size="13" letter-spacing="0.1em" fill="#8fa3b3" text-anchor="middle">KN</text>
  </g>

  <!-- TWD tile -->
  <g id="tile-twd">
    <rect x="343" y="287" width="338" height="205" rx="8" fill="#111920" stroke="#1e2e3a" stroke-width="1"/>
    <text x="512" y="306" font-family="Barlow Condensed, sans-serif" font-size="11" font-weight="700" letter-spacing="0.12em" fill="#4a6070" text-anchor="middle">TWD</text>
    <text x="512" y="403" font-family="Share Tech Mono, monospace" font-size="60" fill="#f0f4f8" text-anchor="middle" dominant-baseline="central">195</text>
    <text x="512" y="473" font-family="Barlow Condensed, sans-serif" font-size="13" letter-spacing="0.1em" fill="#8fa3b3" text-anchor="middle">DEG T</text>
  </g>

  <!-- STW tile (cyan) -->
  <g id="tile-stw">
    <rect x="684" y="287" width="337" height="205" rx="8" fill="#111920" stroke="#1e2e3a" stroke-width="1"/>
    <text x="852" y="306" font-family="Barlow Condensed, sans-serif" font-size="11" font-weight="700" letter-spacing="0.12em" fill="#4a6070" text-anchor="middle">STW</text>
    <text x="852" y="403" font-family="Share Tech Mono, monospace" font-size="60" fill="#06b6d4" text-anchor="middle" dominant-baseline="central">3.8</text>
    <text x="852" y="473" font-family="Barlow Condensed, sans-serif" font-size="13" letter-spacing="0.1em" fill="#8fa3b3" text-anchor="middle">KN</text>
  </g>

  <!-- ROW 3: AUTOPILOT (full width) -->
  <g id="tile-ap">
    <rect x="3" y="495" width="1018" height="140" rx="8" fill="#111920" stroke="#1e2e3a" stroke-width="1"/>
    <!-- AP left section -->
    <text x="120" y="518" font-family="Barlow Condensed, sans-serif" font-size="10" font-weight="700" letter-spacing="0.12em" fill="#4a6070" text-anchor="middle">AUTOPILOT</text>
    <text x="120" y="575" font-family="Share Tech Mono, monospace" font-size="48" fill="#f5a820" text-anchor="middle">247</text>
    <text x="155" y="568" font-family="Share Tech Mono, monospace" font-size="20" fill="#f5a820">°</text>
    <text x="120" y="618" font-family="Barlow Condensed, sans-serif" font-size="9" letter-spacing="0.1em" fill="#4a6070" text-anchor="middle">STEER HDG</text>

    <!-- AP buttons -->
    <rect x="280" y="540" width="100" height="50" rx="4" fill="#16222d" stroke="#2a3f50" stroke-width="1"/>
    <text x="330" y="570" font-family="Barlow Condensed, sans-serif" font-size="14" font-weight="700" fill="#e8edf2" text-anchor="middle">-10°</text>

    <rect x="390" y="540" width="100" height="50" rx="4" fill="#16222d" stroke="#2a3f50" stroke-width="1"/>
    <text x="440" y="570" font-family="Barlow Condensed, sans-serif" font-size="14" font-weight="700" fill="#e8edf2" text-anchor="middle">-1°</text>

    <!-- Engage button (STBY state) -->
    <rect x="500" y="530" width="160" height="60" rx="4" fill="rgba(14,83,45,0.5)" stroke="#22c55e" stroke-width="1"/>
    <text x="580" y="565" font-family="Barlow Condensed, sans-serif" font-size="15" font-weight="700" fill="#22c55e" text-anchor="middle">STBY</text>

    <rect x="670" y="540" width="100" height="50" rx="4" fill="#16222d" stroke="#2a3f50" stroke-width="1"/>
    <text x="720" y="570" font-family="Barlow Condensed, sans-serif" font-size="14" font-weight="700" fill="#e8edf2" text-anchor="middle">+1°</text>

    <rect x="780" y="540" width="100" height="50" rx="4" fill="#16222d" stroke="#2a3f50" stroke-width="1"/>
    <text x="830" y="570" font-family="Barlow Condensed, sans-serif" font-size="14" font-weight="700" fill="#e8edf2" text-anchor="middle">+10°</text>
  </g>

  <!-- ── MOB BUTTON ── -->
  <g id="mob-button">
    <circle cx="48" cy="700" r="32" fill="#ef4444" stroke="#ff4444" stroke-width="2"/>
    <text x="48" y="693" font-size="20" fill="white" text-anchor="middle">&#9888;</text>
    <text x="48" y="710" font-family="Barlow Condensed, sans-serif" font-size="10" font-weight="700" letter-spacing="0.06em" fill="white" text-anchor="middle">MOB</text>
    <!-- Glow -->
    <circle cx="48" cy="700" r="34" fill="none" stroke="rgba(239,68,68,0.3)" stroke-width="6"/>
  </g>

  <!-- ── STATUS STRIP — INFORMATIONAL MODE ── -->
  <g id="status-strip-info">
    <rect x="0" y="732" width="1024" height="36" fill="#0d1318"/>
    <line x1="0" y1="732" x2="1024" y2="732" stroke="#1e2e3a" stroke-width="1"/>
    <!-- Compass icon (muted) -->
    <text x="92" y="754" font-family="Share Tech Mono, monospace" font-size="14" fill="#4a6070" text-anchor="middle">&#9678;</text>
    <!-- Info text — left-padded 80px for MOB clearance -->
    <text x="110" y="755" font-family="Share Tech Mono, monospace" font-size="12" letter-spacing="0.06em" fill="#8fa3b3">HDG 247 T  ·  ETA 14:32  ·  BATT 12.8V  SOC 87%</text>
    <!-- Timestamp right -->
    <text x="960" y="755" font-family="Share Tech Mono, monospace" font-size="10" fill="#4a6070" text-anchor="end">14:31</text>
  </g>

  <!-- ── ANNOTATION: Layout structure ── -->
  <g id="annotations" opacity="0">
    <!-- Grid: 3 cols x 3 rows (1:1:0.7 row ratio) -->
    <!-- Strip: 36px fixed bottom -->
    <!-- MOB: 64px circle, bottom-left, z above strip -->
  </g>
</svg>