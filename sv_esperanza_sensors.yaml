# ── NMEA0183 OUTPUT ───────────────────────────────────────────
interval:
  - interval: 1s
    then:
      - lambda: |-

          // ── VHW: Speed Through Water ──────────────────────
          // $IIVHW,,T,,M,S.SS,N,,K*cs
          {
            char s[64];
            snprintf(s, sizeof(s),
              "IIVHW,,T,,M,%.2f,N,,K", id(g_speed));
            uint8_t cs = 0;
            for (int i = 0; s[i]; i++) cs ^= s[i];
            char f[80];
            snprintf(f, sizeof(f), "$%s*%02X\r\n", s, cs);
            nmea_push(f);
          }

          // ── MDA: Meteorological Composite ─────────────────
          // Pressure in BARS (hPa / 1000)
          // OpenCPN only accepts 0.8–1.1 bar
          {
            float p_bar = id(g_pressure) / 1000.0;
            char s[128];
            snprintf(s, sizeof(s),
              "IIMDA,,I,%.4f,B,%.1f,C,,C,%.0f,,,,C,,,,,",
              p_bar, id(g_temp), id(g_humidity));
            uint8_t cs = 0;
            for (int i = 0; s[i]; i++) cs ^= s[i];
            char f[148];
            snprintf(f, sizeof(f), "$%s*%02X\r\n", s, cs);
            nmea_push(f);
          }

          // ── XDR: Air Temperature ──────────────────────────
          // OpenCPN reads air temp from XDR not MDA
          {
            char s[64];
            snprintf(s, sizeof(s),
              "IIXDR,C,%.1f,C,TempAir", id(g_temp));
            uint8_t cs = 0;
            for (int i = 0; s[i]; i++) cs ^= s[i];
            char f[80];
            snprintf(f, sizeof(f), "$%s*%02X\r\n", s, cs);
            nmea_push(f);
          }

          // ── XDR: Humidity ─────────────────────────────────
          {
            char s[64];
            snprintf(s, sizeof(s),
              "IIXDR,H,%.0f,P,Humidity", id(g_humidity));
            uint8_t cs = 0;
            for (int i = 0; s[i]; i++) cs ^= s[i];
            char f[80];
            snprintf(f, sizeof(f), "$%s*%02X\r\n", s, cs);
            nmea_push(f);
          }

          // ── RPM: Engine RPM ───────────────────────────────
          // Uncomment when optocoupler arrives
          // {
          //   float pct = (id(g_rpm) / ${rpm_max}) * 100.0;
          //   char s[64];
          //   snprintf(s, sizeof(s),
          //     "IIRPM,E,1,%.0f,%.0f,A", id(g_rpm), pct);
          //   uint8_t cs = 0;
          //   for (int i = 0; s[i]; i++) cs ^= s[i];
          //   char f[80];
          //   snprintf(f, sizeof(f), "$%s*%02X\r\n", s, cs);
          //   nmea_push(f);
          // }

          // ── XDR: Fuel Level ───────────────────────────────
          // Uncomment when INA219 arrives
          // {
          //   char s[64];
          //   snprintf(s, sizeof(s),
          //     "IIXDR,V,%.0f,P,Fuel", id(g_fuel_pct));
          //   uint8_t cs = 0;
          //   for (int i = 0; s[i]; i++) cs ^= s[i];
          //   char f[80];
          //   snprintf(f, sizeof(f), "$%s*%02X\r\n", s, cs);
          //   nmea_push(f);
          // }
